<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>働く人の相談室 よはく | 産業医・労働衛生コンサルタント事務所</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #333333;
            font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
            line-height: 2.2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 750px;
            width: 85%;
            text-align: center;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            box-sizing: border-box;
        }

        .logo-area img {
            max-width: 600px;
            height: auto;
            mix-blend-mode: multiply; 
            margin-bottom: 20px;
        }

        section {
            margin-bottom: 120px;
            padding-top: 40px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: #888888;
            margin-bottom: 40px;
        }
        .catchphrase {
            font-size: 1.1rem;
            margin-top: 50px;
            color: #555555;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        h2 {
            font-size: 1.1rem;
            display: inline-block;
            padding-bottom: 12px;
            margin-bottom: 50px;
            font-weight: 500;
            border-bottom: 1px solid #eeeeee;
        }
        .content-text, .profile-list {
            text-align: left;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .highlight {
            border-bottom: 1px solid #d1ced0; 
        }
        .profile-list {
            list-style: none;
            padding: 0;
        }
        .profile-list li {
            margin-bottom: 15px;
        }

        /* 署名部分の調整 */
        .signature {
            text-align: right;
            margin-top: 40px;
            color: #4a4a4a;
        }
        .signature .title {
            font-size: 0.85rem; /* 肩書きを小さく */
            margin-right: 0.8em;
            color: #777777;
            letter-spacing: 0.1em;
        }
        .signature .name {
            font-size: 1.15rem;
            letter-spacing: 0.3em;
        }

        .contact-form {
            text-align: left;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #666;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            background-color: transparent;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #8c7b6d;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #f0edea;
            color: #777777;
            border: 1px solid #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.1em;
        }
        .submit-btn:hover {
            background-color: #e8e4e1;
            color: #333;
        }

        .insta-area {
            margin-top: 50px;
        }
        .insta-link {
            color: #888888;
            font-size: 1.8rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .insta-link:hover {
            color: #8c7b6d;
        }

        footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: #bbb;
            padding-bottom: 60px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-section">
            <div class="logo-area">
                <img src="logo.png" alt="よはく ロゴ">
            </div>
            <h1>働く人の相談室 よはく</h1>
            <p class="subtitle">産業医・労働衛生コンサルタント事務所</p>
            <p class="catchphrase">誰もが健やかに、その人らしく働ける社会を</p>
        </div>
